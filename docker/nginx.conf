user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    access_log /dev/stdout;

    upstream hub {
        server 127.0.0.1:8080;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html;
        index index.html;

        # Security headers (safe for the SPA; defense-in-depth — note these do
        # NOT stop browser extensions, which run with page privileges).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        # Enable HSTS once you serve over HTTPS:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # A full SPA Content-Security-Policy — TEST before enabling (a too-tight
        # script-src can white-screen the Vite bundle). connect-src includes ws:
        # /wss: for the SSH terminal + agent WebSocket.
        # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'" always;

        # Health check
        location = /healthz {
            proxy_pass http://hub;
            access_log off;
        }

        # API → Go backend
        location /api/ {
            proxy_pass http://hub;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Subscription download (sub-store compat)
        location /download/ {
            proxy_pass http://hub;
            proxy_set_header Host $host;
        }

        # Short link redirects
        location ~ ^/s/[A-Za-z0-9_-]+$ {
            proxy_pass http://hub;
            proxy_set_header Host $host;
        }

        # Agent install script
        location /install-agent.sh {
            proxy_pass http://hub;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Agent binary download (/dl/agent-<os>-<arch>)
        location /dl/ {
            proxy_pass http://hub;
            proxy_set_header Host $host;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
