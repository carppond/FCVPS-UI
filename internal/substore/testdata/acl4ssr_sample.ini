; ACL4SSR sample (synthetic) for unit tests.
; All credentials are placeholders.

[General]
loglevel=info
dns-server=system

[Proxy]
ss://YWVzLTI1Ni1nY206c2FtcGxlcGFzc3dvcmQxMjM=@example.com:8388#ss-acl-1
trojan://samplepassword@example.com:443?sni=example.com#trojan-acl-1
vless://12345678-1234-1234-1234-123456789abc@example.com:443?security=tls&type=ws&sni=cdn.example.com#vless-acl-1

[Proxy Group]
Auto=url-test,ss-acl-1,trojan-acl-1,vless-acl-1,http://www.gstatic.com/generate_204,300,50
Manual=select,ss-acl-1,trojan-acl-1,vless-acl-1
Final=select,Auto,Manual,DIRECT

[Rule]
DOMAIN-SUFFIX,google.com,Auto
DOMAIN-KEYWORD,facebook,Auto
IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
GEOIP,CN,DIRECT
MATCH,Final

[Override]
clash.mode=rule
