name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          EXT=""
          [[ "${{ matrix.os }}" == "windows" ]] && EXT=".exe"

          for bin_def in "hub:./cmd/server" "agent:./cmd/agent"; do
            BIN_NAME="${bin_def%:*}"
            BIN_PKG="${bin_def#*:}"
            OUT="dist/${BIN_NAME}-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
            echo "Building $OUT..."
            go build \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -trimpath \
              -o "$OUT" \
              "$BIN_PKG"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
          retention-days: 1

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            dist/*
